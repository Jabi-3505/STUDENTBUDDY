<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css/register.css">
</head>
<body>
    <!--main start-->
    <main>
        <!--back button-->
        <div class="back-btn">
            <a href="login.html">
                <i class="bi bi-arrow-left"></i>
            </a>
        </div>
        <!-- Register Section -->
         <section class="register">
            <div class="register-card">
                <h1>Create Your Account</h1>
                <p> Join Student AI to access courses,<br>job updates and AI career guidance.</p>
                <form action="">
                    <!-- Full Name -->
                    <div class="input-box">
                        <label for="fullname">Full Name</label>
                        <inputtype="text"id="fullname"name="fullname"placeholder="Enter your full name"required>
                    </div>
                    <!-- Email -->
                    <div class="input-box">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required >
                    </div>
                    <div class="input-box">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required >
                    </div>
                    <!-- Password -->
                    <div class="input-box">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Create a password" required >
                    </div>
                    <!-- Confirm Password -->
                    <div class="input-box">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required
                        >
                    </div>
                    <!-- Terms -->
                    <div class="terms">
                        <label>
                            <input type="checkbox" required>I agree to the
                            <a href="#">Terms & Conditions</a>
                        </label>
                    </div>
                    <!-- Button -->
                    <button type="submit">Create Account</button>
                </form>
                <p class="login-link">Already have an accocount? <br><a href="login.html">Login here</a></p>
            </div>
         </section>
    </main>
    <!--main end-->
</body>
</html>
